# =============================================================================
# Docker Compose for Surya Komponen Nusantara Internal
# =============================================================================

services:
  # -----------------------------------------------
  # Laravel Application (Nginx + PHP-FPM)
  # -----------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: sanken-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
      - node_modules:/var/www/html/node_modules
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sanken
      - DB_USERNAME=sanken
      - DB_PASSWORD=secret
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FACE_RECOGNITION_URL=http://face-recognition:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sanken

  # -----------------------------------------------
  # Queue Worker
  # -----------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: sanken-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sanken
      - DB_USERNAME=sanken
      - DB_PASSWORD=secret
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sanken

  # -----------------------------------------------
  # Scheduler (Cron)
  # -----------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: sanken-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60;
      done"
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sanken
      - DB_USERNAME=sanken
      - DB_PASSWORD=secret
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sanken

  # -----------------------------------------------
  # Face Recognition Microservice
  # -----------------------------------------------
  face-recognition:
    build:
      context: docker/face-recognition
      dockerfile: Dockerfile
    container_name: sanken-face-recognition
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - face-models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - sanken

  # -----------------------------------------------
  # MySQL Database
  # -----------------------------------------------
  db:
    image: mysql:8.0
    container_name: sanken-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: sanken
      MYSQL_USER: sanken
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanken

  # -----------------------------------------------
  # Redis (Cache + Session + Queue)
  # -----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sanken-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanken

# -----------------------------------------------
# Volumes
# -----------------------------------------------
volumes:
  storage:
  node_modules:
  db:
  redis:
  face-models:

# -----------------------------------------------
# Networks
# -----------------------------------------------
networks:
  sanken:
    driver: bridge
